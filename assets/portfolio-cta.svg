<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 80" width="460" height="80" role="img" aria-label="Visit aarontao.com via npx aaron-tao">
  <defs>
    <style>
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50%     { opacity: 0.35; }
      }
      .pulse { animation: pulse 1.4s ease-in-out infinite; }
      .mono  { font-family: 'SF Mono', Menlo, Consolas, 'Liberation Mono', 'Courier New', monospace; }
    </style>
  </defs>

  <!-- Card -->
  <rect width="460" height="80" rx="12" fill="#0d1117" stroke="#30363d" stroke-width="1"/>

  <!-- Command line -->
  <text x="24" y="34" class="mono" font-size="20">
    <tspan fill="#7ee787" font-weight="700">$</tspan>
    <tspan dx="10" fill="#c9d1d9">npx</tspan>
    <tspan dx="10" fill="#f0f6fc" font-weight="700">portfolio</tspan>
  </text>

  <!-- Output line -->
  <text x="24" y="62" class="mono" font-size="15">
    <tspan fill="#7ee787" font-weight="700">✓</tspan>
    <tspan dx="8" fill="#6e7681">opened</tspan>
    <tspan dx="8" fill="#79c0ff" font-weight="700">aarontao.com</tspan>
    <tspan dx="10" fill="#a371f7" font-weight="700" class="pulse">→</tspan>
  </text>
</svg>
