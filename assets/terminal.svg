<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 248" width="720" height="248">
  <defs>
    <linearGradient id="winBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-15%" y="-50%" width="130%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    @keyframes show         { to { opacity: 1; } }
    @keyframes blink        { 0%,49% { opacity: 0.9; } 50%,100% { opacity: 0; } }
    @keyframes accent-cycle { 0% { fill:#58a6ff; } 33% { fill:#a371f7; } 66% { fill:#f778ba; } 100% { fill:#58a6ff; } }
    .l1 { opacity:0; animation: show .01s  .40s forwards; }
    .l2 { opacity:0; animation: show .01s  .85s forwards; }
    .l3 { opacity:0; animation: show .01s 1.55s forwards; }
    .l4 { opacity:0; animation: show .01s 1.85s forwards; }
    .l5 { opacity:0; animation: show .01s 2.15s forwards; }
    .l6 { opacity:0; animation: show .01s 2.80s forwards; }
    .l7 { opacity:0; animation: show .01s 3.10s forwards; }
    .l8 { opacity:0; animation: show .01s 3.40s forwards; }
    .l9 { opacity:0; animation: show .01s 3.90s forwards; }
    .accent { animation: accent-cycle 6s linear infinite; }
    .cursor { animation: blink 1.1s 3.95s step-end infinite; }
  </style>

  <!-- Window frame -->
  <rect width="720" height="248" rx="12" fill="url(#winBg)" stroke="#30363d" stroke-width="1.2"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="720" height="38" rx="12" fill="#161b22"/>
  <rect x="0" y="26" width="720" height="12" fill="#161b22"/>
  <line x1="0" y1="38" x2="720" y2="38" stroke="#30363d" stroke-width="0.8"/>

  <!-- Animated accent line — matches banner top/bottom bars -->
  <rect class="accent" x="0" y="37" width="720" height="1.5" rx="0"/>

  <!-- Traffic lights -->
  <circle cx="26" cy="19" r="6.5" fill="#ff5f56"/>
  <circle cx="48" cy="19" r="6.5" fill="#ffbd2e"/>
  <circle cx="70" cy="19" r="6.5" fill="#27c93f"/>

  <!-- Window title -->
  <text x="360" y="24" text-anchor="middle"
        font-family="'Courier New',Courier,monospace" font-size="12" fill="#8b949e">
    aaron@ai-engineer: ~/about
  </text>

  <!-- Terminal content -->
  <g font-family="'Courier New',Courier,monospace" font-size="13.5">

    <!-- whoami -->
    <g class="l1">
      <text x="22" y="62">
        <tspan fill="#58a6ff" filter="url(#glow)">❯ </tspan>
        <tspan fill="#7ee787">whoami</tspan>
      </text>
    </g>
    <g class="l2">
      <text x="22" y="80" fill="#e6edf3">  Aaron Tao — AI Engineer &amp; Full-Stack Developer</text>
    </g>

    <!-- cat mission.txt -->
    <g class="l3">
      <text x="22" y="106">
        <tspan fill="#58a6ff" filter="url(#glow)">❯ </tspan>
        <tspan fill="#7ee787">cat mission.txt</tspan>
      </text>
    </g>
    <g class="l4">
      <text x="22" y="124" fill="#e6edf3">  Building production AI systems — RAG pipelines, LLM integrations,</text>
    </g>
    <g class="l5">
      <text x="22" y="142" fill="#e6edf3">  full-stack platforms shipped from zero to live users.</text>
    </g>

    <!-- cat status.txt -->
    <g class="l6">
      <text x="22" y="168">
        <tspan fill="#58a6ff" filter="url(#glow)">❯ </tspan>
        <tspan fill="#7ee787">cat status.txt</tspan>
      </text>
    </g>
    <g class="l7">
      <text x="22" y="186" fill="#a371f7">  Monash University CS · University of Melbourne IT · Australian PR</text>
    </g>
    <g class="l8">
      <text x="22" y="204" fill="#a371f7">  Published iOS App · 6+ Projects in Prod · Open to Full-Time in Melbourne</text>
    </g>

    <!-- final prompt -->
    <g class="l9">
      <text x="22" y="230">
        <tspan fill="#58a6ff" filter="url(#glow)">❯ </tspan>
      </text>
    </g>
  </g>

  <!-- Blinking cursor (hidden until l9 appears) -->
  <rect class="cursor" opacity="0" x="38" y="218" width="8" height="14" rx="1"
        fill="#58a6ff" filter="url(#softglow)"/>
</svg>
