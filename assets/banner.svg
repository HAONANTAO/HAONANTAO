<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="900" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongGlow" x="-30%" y="-50%" width="160%" height="200%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="scanFilter" x="-5%" y="-500%" width="110%" height="1100%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip1"><rect x="0" y="0" width="900" height="280"/></clipPath>
  </defs>

  <style>
    @keyframes glitchR {
      0%,79%,100% { transform:translate(0,0); clip-path:inset(0 0 100% 0); }
      80% { clip-path:inset(15% 0 55% 0); transform:translate(-4px, 1px); }
      82% { clip-path:inset(65% 0 10% 0); transform:translate(4px, -1px); }
      84% { clip-path:inset(35% 0 30% 0); transform:translate(-3px, 0); }
      86% { clip-path:inset(5%  0 75% 0); transform:translate(3px, 2px); }
      88% { clip-path:inset(80% 0 5%  0); transform:translate(-4px, -1px); }
      90% { clip-path:inset(45% 0 20% 0); transform:translate(2px, 0); }
    }
    @keyframes glitchB {
      0%,81%,100% { transform:translate(0,0); clip-path:inset(0 0 100% 0); }
      82% { clip-path:inset(55% 0 20% 0); transform:translate(4px, -2px); }
      84% { clip-path:inset(10% 0 60% 0); transform:translate(-4px, 1px); }
      86% { clip-path:inset(70% 0 8%  0); transform:translate(3px, 0); }
      88% { clip-path:inset(25% 0 45% 0); transform:translate(-2px, -1px); }
      90% { clip-path:inset(88% 0 2%  0); transform:translate(4px, 2px); }
    }
    @keyframes scan {
      0%   { transform:translateY(-4px); opacity:0; }
      3%   { opacity:0.7; }
      97%  { opacity:0.5; }
      100% { transform:translateY(284px); opacity:0; }
    }
    @keyframes topbar {
      0%   { fill:#58a6ff; }
      33%  { fill:#a371f7; }
      66%  { fill:#f778ba; }
      100% { fill:#58a6ff; }
    }
    @keyframes botbar {
      0%   { fill:#a371f7; }
      33%  { fill:#f778ba; }
      66%  { fill:#58a6ff; }
      100% { fill:#a371f7; }
    }
    @keyframes blink {
      0%,94%,100% { opacity:1; }
      95% { opacity:0; }
      97% { opacity:1; }
      98% { opacity:0; }
    }
    @keyframes subtitlePulse {
      0%,100% { opacity:0.75; }
      50%     { opacity:1; }
    }
    .glitch-r { animation: glitchR 9s infinite; }
    .glitch-b { animation: glitchB 9s infinite 0.08s; }
    .main-text { animation: blink 9s infinite; }
    .scan-line { animation: scan 4s linear infinite; }
    .top-bar   { animation: topbar 6s linear infinite; }
    .bot-bar   { animation: botbar 6s linear infinite; }
    .sub       { animation: subtitlePulse 3s ease-in-out infinite; }
  </style>

  <!-- Background -->
  <rect width="900" height="280" fill="url(#bg)"/>

  <!-- Grid -->
  <g stroke="#58a6ff" stroke-width="0.25" opacity="0.06">
    <line x1="90"  y1="0" x2="90"  y2="280"/>
    <line x1="180" y1="0" x2="180" y2="280"/>
    <line x1="270" y1="0" x2="270" y2="280"/>
    <line x1="360" y1="0" x2="360" y2="280"/>
    <line x1="450" y1="0" x2="450" y2="280"/>
    <line x1="540" y1="0" x2="540" y2="280"/>
    <line x1="630" y1="0" x2="630" y2="280"/>
    <line x1="720" y1="0" x2="720" y2="280"/>
    <line x1="810" y1="0" x2="810" y2="280"/>
    <line x1="0" y1="56"  x2="900" y2="56"/>
    <line x1="0" y1="112" x2="900" y2="112"/>
    <line x1="0" y1="168" x2="900" y2="168"/>
    <line x1="0" y1="224" x2="900" y2="224"/>
  </g>

  <!-- Neural net edges — left -->
  <g stroke="#58a6ff" fill="none">
    <line x1="55" y1="38"  x2="148" y2="95">  <animate attributeName="stroke-opacity" values="0.04;0.28;0.04" dur="3.1s"            repeatCount="indefinite"/></line>
    <line x1="148" y1="95" x2="230" y2="48">  <animate attributeName="stroke-opacity" values="0.06;0.32;0.06" dur="2.6s" begin=".4s" repeatCount="indefinite"/></line>
    <line x1="148" y1="95" x2="185" y2="188"> <animate attributeName="stroke-opacity" values="0.04;0.24;0.04" dur="3.8s" begin=".9s" repeatCount="indefinite"/></line>
    <line x1="55"  y1="38" x2="38"  y2="155"> <animate attributeName="stroke-opacity" values="0.05;0.26;0.05" dur="4.2s" begin=".2s" repeatCount="indefinite"/></line>
    <line x1="38"  y1="155" x2="92" y2="238"> <animate attributeName="stroke-opacity" values="0.04;0.22;0.04" dur="2.9s" begin=".7s" repeatCount="indefinite"/></line>
    <line x1="92"  y1="238" x2="185" y2="188"><animate attributeName="stroke-opacity" values="0.05;0.28;0.05" dur="3.5s"            repeatCount="indefinite"/></line>
    <line x1="185" y1="188" x2="230" y2="48"> <animate attributeName="stroke-opacity" values="0.03;0.20;0.03" dur="4.5s" begin="1s" repeatCount="indefinite"/></line>
  </g>
  <!-- Neural net edges — right -->
  <g stroke="#a371f7" fill="none">
    <line x1="845" y1="38"  x2="752" y2="95">  <animate attributeName="stroke-opacity" values="0.04;0.28;0.04" dur="3.1s" begin=".3s" repeatCount="indefinite"/></line>
    <line x1="752" y1="95"  x2="670" y2="48">  <animate attributeName="stroke-opacity" values="0.06;0.32;0.06" dur="2.6s" begin=".8s" repeatCount="indefinite"/></line>
    <line x1="752" y1="95"  x2="715" y2="188"> <animate attributeName="stroke-opacity" values="0.04;0.24;0.04" dur="3.8s" begin=".5s" repeatCount="indefinite"/></line>
    <line x1="845" y1="38"  x2="862" y2="155"> <animate attributeName="stroke-opacity" values="0.05;0.26;0.05" dur="4.2s" begin=".6s" repeatCount="indefinite"/></line>
    <line x1="862" y1="155" x2="808" y2="238"> <animate attributeName="stroke-opacity" values="0.04;0.22;0.04" dur="2.9s" begin="1s" repeatCount="indefinite"/></line>
    <line x1="808" y1="238" x2="715" y2="188"> <animate attributeName="stroke-opacity" values="0.05;0.28;0.05" dur="3.5s" begin=".4s" repeatCount="indefinite"/></line>
    <line x1="715" y1="188" x2="670" y2="48">  <animate attributeName="stroke-opacity" values="0.03;0.20;0.03" dur="4.5s" begin=".2s" repeatCount="indefinite"/></line>
  </g>

  <!-- Neural net nodes — left (cyan) -->
  <g fill="#58a6ff" filter="url(#glow)">
    <circle cx="55"  cy="38">  <animate attributeName="r" values="2.5;4.5;2.5" dur="3.1s"            repeatCount="indefinite"/><animate attributeName="opacity" values=".2;.9;.2" dur="3.1s"            repeatCount="indefinite"/></circle>
    <circle cx="148" cy="95">  <animate attributeName="r" values="3;5.5;3"     dur="2.6s" begin=".4s" repeatCount="indefinite"/><animate attributeName="opacity" values=".3;1;.3"   dur="2.6s" begin=".4s" repeatCount="indefinite"/></circle>
    <circle cx="230" cy="48">  <animate attributeName="r" values="2;3.5;2"     dur="3.8s" begin=".9s" repeatCount="indefinite"/><animate attributeName="opacity" values=".2;.8;.2" dur="3.8s" begin=".9s" repeatCount="indefinite"/></circle>
    <circle cx="38"  cy="155"> <animate attributeName="r" values="2.5;4;2.5"   dur="4.2s" begin=".2s" repeatCount="indefinite"/><animate attributeName="opacity" values=".3;.9;.3" dur="4.2s" begin=".2s" repeatCount="indefinite"/></circle>
    <circle cx="92"  cy="238"> <animate attributeName="r" values="2;3.5;2"     dur="2.9s" begin=".7s" repeatCount="indefinite"/><animate attributeName="opacity" values=".2;.7;.2" dur="2.9s" begin=".7s" repeatCount="indefinite"/></circle>
    <circle cx="185" cy="188"> <animate attributeName="r" values="3;5;3"       dur="3.5s" begin="1.5s" repeatCount="indefinite"/><animate attributeName="opacity" values=".3;.9;.3" dur="3.5s" begin="1.5s" repeatCount="indefinite"/></circle>
  </g>
  <!-- Neural net nodes — right (purple) -->
  <g fill="#a371f7" filter="url(#glow)">
    <circle cx="845" cy="38">  <animate attributeName="r" values="2.5;4.5;2.5" dur="3.1s" begin=".3s"  repeatCount="indefinite"/><animate attributeName="opacity" values=".2;.9;.2" dur="3.1s" begin=".3s"  repeatCount="indefinite"/></circle>
    <circle cx="752" cy="95">  <animate attributeName="r" values="3;5.5;3"     dur="2.6s" begin=".8s"  repeatCount="indefinite"/><animate attributeName="opacity" values=".3;1;.3"   dur="2.6s" begin=".8s"  repeatCount="indefinite"/></circle>
    <circle cx="670" cy="48">  <animate attributeName="r" values="2;3.5;2"     dur="3.8s" begin=".5s"  repeatCount="indefinite"/><animate attributeName="opacity" values=".2;.8;.2" dur="3.8s" begin=".5s"  repeatCount="indefinite"/></circle>
    <circle cx="862" cy="155"> <animate attributeName="r" values="2.5;4;2.5"   dur="4.2s" begin=".6s"  repeatCount="indefinite"/><animate attributeName="opacity" values=".3;.9;.3" dur="4.2s" begin=".6s"  repeatCount="indefinite"/></circle>
    <circle cx="808" cy="238"> <animate attributeName="r" values="2;3.5;2"     dur="2.9s" begin="1s"   repeatCount="indefinite"/><animate attributeName="opacity" values=".2;.7;.2" dur="2.9s" begin="1s"   repeatCount="indefinite"/></circle>
    <circle cx="715" cy="188"> <animate attributeName="r" values="3;5;3"       dur="3.5s" begin=".4s"  repeatCount="indefinite"/><animate attributeName="opacity" values=".3;.9;.3" dur="3.5s" begin=".4s"  repeatCount="indefinite"/></circle>
  </g>

  <!-- Ambient glow orbs -->
  <circle cx="210" cy="140" r="100" fill="#58a6ff" opacity="0.025"/>
  <circle cx="690" cy="140" r="100" fill="#a371f7" opacity="0.025"/>
  <circle cx="450" cy="140" r="120" fill="#a371f7" opacity="0.018"/>

  <!-- Scanning line -->
  <rect class="scan-line" x="0" y="0" width="900" height="2.5" fill="#58a6ff" filter="url(#scanFilter)" clip-path="url(#clip1)"/>

  <!-- Corner brackets — top left -->
  <g stroke="#58a6ff" stroke-width="1.8" fill="none" filter="url(#glow)" opacity="0.8">
    <polyline points="18,52 18,18 52,18"/>
    <circle cx="18" cy="18" r="2.5" fill="#58a6ff"/>
    <circle cx="52" cy="18" r="1.8" fill="#58a6ff" opacity="0.6"/>
    <line x1="26" y1="18" x2="34" y2="18" stroke="#58a6ff" stroke-width="0.8" opacity="0.5"/>
  </g>
  <!-- Corner brackets — top right -->
  <g stroke="#58a6ff" stroke-width="1.8" fill="none" filter="url(#glow)" opacity="0.8">
    <polyline points="882,52 882,18 848,18"/>
    <circle cx="882" cy="18" r="2.5" fill="#58a6ff"/>
    <circle cx="848" cy="18" r="1.8" fill="#58a6ff" opacity="0.6"/>
    <line x1="874" y1="18" x2="866" y2="18" stroke="#58a6ff" stroke-width="0.8" opacity="0.5"/>
  </g>
  <!-- Corner brackets — bottom left -->
  <g stroke="#a371f7" stroke-width="1.8" fill="none" filter="url(#glow)" opacity="0.8">
    <polyline points="18,228 18,262 52,262"/>
    <circle cx="18" cy="262" r="2.5" fill="#a371f7"/>
    <circle cx="52" cy="262" r="1.8" fill="#a371f7" opacity="0.6"/>
  </g>
  <!-- Corner brackets — bottom right -->
  <g stroke="#a371f7" stroke-width="1.8" fill="none" filter="url(#glow)" opacity="0.8">
    <polyline points="882,228 882,262 848,262"/>
    <circle cx="882" cy="262" r="2.5" fill="#a371f7"/>
    <circle cx="848" cy="262" r="1.8" fill="#a371f7" opacity="0.6"/>
  </g>

  <!-- Top/bottom accent bars -->
  <rect class="top-bar" x="0" y="0"   width="900" height="2.5" rx="1"/>
  <rect class="bot-bar" x="0" y="277.5" width="900" height="2.5" rx="1"/>

  <!-- Glitch layers -->
  <text class="glitch-r" x="450" y="142" text-anchor="middle"
    font-family="'Courier New',Courier,monospace" font-size="52" font-weight="900" letter-spacing="8"
    fill="#f778ba" opacity="0.75">AARON TAO</text>

  <text class="glitch-b" x="450" y="142" text-anchor="middle"
    font-family="'Courier New',Courier,monospace" font-size="52" font-weight="900" letter-spacing="8"
    fill="#58a6ff" opacity="0.75">AARON TAO</text>

  <!-- Main text -->
  <text class="main-text" x="450" y="142" text-anchor="middle"
    font-family="'Courier New',Courier,monospace" font-size="52" font-weight="900" letter-spacing="8"
    fill="white" filter="url(#strongGlow)">AARON TAO</text>

  <!-- Subtitle -->
  <text class="sub" x="450" y="168" text-anchor="middle"
    font-family="'Courier New',Courier,monospace" font-size="13" letter-spacing="5"
    fill="#58a6ff" filter="url(#glow)">AI ENGINEER · FULL-STACK · MELBOURNE</text>

  <!-- Divider dots -->
  <g fill="#58a6ff" filter="url(#glow)">
    <circle cx="306" cy="152" r="1.8"><animate attributeName="opacity" values=".2;.9;.2" dur="2s"            repeatCount="indefinite"/></circle>
    <circle cx="594" cy="152" r="1.8"><animate attributeName="opacity" values=".2;.9;.2" dur="2s" begin="1s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Tech tags -->
  <g font-family="'Courier New',Courier,monospace" font-size="10.5" letter-spacing="0.5">
    <rect x="216" y="192" width="54"  height="20" rx="3" fill="#58a6ff" opacity="0.08"/>
    <rect x="216" y="192" width="54"  height="20" rx="3" fill="none" stroke="#58a6ff" stroke-width="0.7" opacity="0.55"/>
    <text x="243" y="206" text-anchor="middle" fill="#58a6ff" opacity="0.9">React</text>

    <rect x="277" y="192" width="60"  height="20" rx="3" fill="#58a6ff" opacity="0.08"/>
    <rect x="277" y="192" width="60"  height="20" rx="3" fill="none" stroke="#58a6ff" stroke-width="0.7" opacity="0.55"/>
    <text x="307" y="206" text-anchor="middle" fill="#58a6ff" opacity="0.9">Node.js</text>

    <rect x="344" y="192" width="68"  height="20" rx="3" fill="#58a6ff" opacity="0.08"/>
    <rect x="344" y="192" width="68"  height="20" rx="3" fill="none" stroke="#58a6ff" stroke-width="0.7" opacity="0.55"/>
    <text x="378" y="206" text-anchor="middle" fill="#58a6ff" opacity="0.9">MongoDB</text>

    <rect x="419" y="192" width="44"  height="20" rx="3" fill="#a371f7" opacity="0.08"/>
    <rect x="419" y="192" width="44"  height="20" rx="3" fill="none" stroke="#a371f7" stroke-width="0.7" opacity="0.55"/>
    <text x="441" y="206" text-anchor="middle" fill="#a371f7" opacity="0.9">AWS</text>

    <rect x="470" y="192" width="78"  height="20" rx="3" fill="#a371f7" opacity="0.08"/>
    <rect x="470" y="192" width="78"  height="20" rx="3" fill="none" stroke="#a371f7" stroke-width="0.7" opacity="0.55"/>
    <text x="509" y="206" text-anchor="middle" fill="#a371f7" opacity="0.9">TypeScript</text>

    <rect x="555" y="192" width="92"  height="20" rx="3" fill="#f778ba" opacity="0.08"/>
    <rect x="555" y="192" width="92"  height="20" rx="3" fill="none" stroke="#f778ba" stroke-width="0.7" opacity="0.55"/>
    <text x="601" y="206" text-anchor="middle" fill="#f778ba" opacity="0.9">React Native</text>

    <rect x="654" y="192" width="30"  height="20" rx="3" fill="#f778ba" opacity="0.08"/>
    <rect x="654" y="192" width="30"  height="20" rx="3" fill="none" stroke="#f778ba" stroke-width="0.7" opacity="0.55"/>
    <text x="669" y="206" text-anchor="middle" fill="#f778ba" opacity="0.9">AI</text>
  </g>

  <!-- Cursor blink -->
  <rect x="693" y="189" width="8" height="16" rx="1" fill="#58a6ff" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0;0.7" dur="1.1s" repeatCount="indefinite"/>
  </rect>
</svg>
