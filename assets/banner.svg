<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="900" height="280" role="img" aria-label="Aaron Tao – AI Engineer × Full-Stack Builder">
  <defs>
    <clipPath id="window">
      <rect width="900" height="280" rx="10"/>
    </clipPath>
    <style>
      @keyframes cursorBlink {
        0%, 50%   { opacity: 1; }
        50.01%, 100% { opacity: 0; }
      }
      .cursor { animation: cursorBlink 1.05s steps(1) infinite; }
      .mono   { font-family: 'SF Mono', Menlo, Consolas, 'Liberation Mono', 'Courier New', monospace; }
    </style>
  </defs>

  <g clip-path="url(#window)">
    <!-- Window body -->
    <rect width="900" height="280" fill="#0d1117"/>

    <!-- Title bar -->
    <rect width="900" height="36" fill="#161b22"/>
    <line x1="0" y1="36" x2="900" y2="36" stroke="#21262d" stroke-width="1"/>

    <!-- Traffic lights -->
    <circle cx="22" cy="18" r="6" fill="#ff5f57"/>
    <circle cx="42" cy="18" r="6" fill="#febc2e"/>
    <circle cx="62" cy="18" r="6" fill="#28c840"/>

    <!-- Title bar text -->
    <text x="450" y="23" text-anchor="middle" class="mono"
          font-size="12" fill="#6e7681" letter-spacing="0.4">
      aaron@melbourne: ~
    </text>

    <!-- $ whoami -->
    <text x="60" y="82" class="mono" font-size="15">
      <tspan fill="#7ee787">$</tspan>
      <tspan fill="#c9d1d9" dx="8">whoami</tspan>
    </text>

    <!-- Output rows -->
    <g class="mono" font-size="15">
      <text y="118">
        <tspan x="60"  fill="#6e7681">name</tspan>
        <tspan x="170" fill="#f0f6fc" font-weight="700">Aaron Tao</tspan>
      </text>
      <text y="144">
        <tspan x="60"  fill="#6e7681">role</tspan>
        <tspan x="170" fill="#c9d1d9">AI Engineer · Full-Stack Builder</tspan>
      </text>
      <text y="170">
        <tspan x="60"  fill="#6e7681">based</tspan>
        <tspan x="170" fill="#c9d1d9">Melbourne, AU</tspan>
      </text>
      <text y="196">
        <tspan x="60"  fill="#6e7681">focus</tspan>
        <tspan x="170" fill="#c9d1d9">RAG systems · LLM agents · production AI</tspan>
      </text>
      <text y="222">
        <tspan x="60"  fill="#6e7681">status</tspan>
        <tspan x="170" fill="#7ee787" font-weight="700">shipping</tspan>
      </text>
    </g>

    <!-- Ready prompt with blinking cursor -->
    <text x="60" y="254" class="mono" font-size="15" fill="#7ee787">$</text>
    <rect class="cursor" x="78" y="242" width="9" height="14" fill="#c9d1d9"/>
  </g>
</svg>
