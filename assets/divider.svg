<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 16" width="900" height="16">
  <defs>
    <filter id="glowD" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="dline" x1="0%" x2="100%">
      <stop offset="0%"  stop-color="#0d1117" stop-opacity="0"/>
      <stop offset="18%" stop-color="#58a6ff" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#a371f7" stop-opacity="0.9"/>
      <stop offset="82%" stop-color="#f778ba" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <line x1="0" y1="8" x2="900" y2="8" stroke="url(#dline)" stroke-width="0.7" filter="url(#glowD)"/>

  <g filter="url(#glowD)">
    <circle cx="438" cy="8" r="1.8" fill="#58a6ff">
      <animate attributeName="r" values="1.4;2.6;1.4" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="450" cy="8" r="2.2" fill="#a371f7">
      <animate attributeName="r" values="1.8;3;1.8" dur="2.4s" begin="0.35s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.4s" begin="0.35s" repeatCount="indefinite"/>
    </circle>
    <circle cx="462" cy="8" r="1.8" fill="#f778ba">
      <animate attributeName="r" values="1.4;2.6;1.4" dur="2.4s" begin="0.7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2.4s" begin="0.7s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
